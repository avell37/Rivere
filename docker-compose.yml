services:
    backend:
        build: ./backend
        container_name: rivere_backend
        ports:
            - "5000:5000"
        env_file:
            - ./backend/.env.production
        depends_on:
            - db
            - redis

    frontend:
        build: ./frontend
        container_name: rivere_frontend
        ports:
            - "3000:3000"
        depends_on:
            - backend
        env_file:
            - ./frontend/.env.production

    db:
        image: postgres:15-alpine
        container_name: rivere_db_postgres
        ports:
            - "5432:5432"
        env_file:
            - ./backend/.env.production
        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:8-alpine
        container_name: rivere_db_redis
        ports:
            - "6379:6379"
        env_file:
            - ./backend/.env

    migrate:
        image: node:20-alpine
        working_dir: /app
        volumes:
            - ./backend:/app
        command: npx prisma db push --config prisma.config.ts
        depends_on:
            - db

    nginx:
        image: nginx:alpine
        container_name: nginx
        restart: always
        ports:
            - "80:80"
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            - frontend
            - backend

volumes:
    postgres_data:
