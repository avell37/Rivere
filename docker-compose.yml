services:
    backend:
        build: ./backend
        read_only: true
        expose:
            - "5000"
        env_file:
            - ./backend/.env.production
        depends_on:
            - db
            - redis

    frontend:
        build: ./frontend
        read_only: true
        expose:
            - "3000"
        depends_on:
            - backend
        env_file:
            - ./frontend/.env.production

    db:
        image: postgres:15-alpine
        env_file:
            - ./backend/.env.production
        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:8-alpine
        command: sh -c 'redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes'
        env_file:
            - ./backend/.env.production

    migrate:
        image: node:20-alpine
        working_dir: /app
        volumes:
            - ./backend:/app
        command: npx prisma db push --config prisma.config.ts
        depends_on:
            - db

    nginx:
        image: nginx:alpine
        container_name: rivere_nginx
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./nginx.conf:/etc/nginx/conf.d/default.conf
            - /etc/letsencrypt:/etc/letsencrypt
        depends_on:
            - frontend
            - backend

volumes:
    postgres_data:
